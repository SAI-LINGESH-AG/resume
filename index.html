<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>Sai Lingesh R - Data Engineer &amp; AI/LLM Engineer</title>
  <meta name="description" content="Sai Lingesh R - Data Engineer, AI/LLM Engineer, and ML Practitioner. Specializing in Databricks, PySpark, LLMs, and intelligent data systems." />
  <meta name="keywords" content="Data Engineer, AI Engineer, ML Engineer, Databricks, PySpark, Python, LLM, Machine Learning, Generative AI, RAG, FastAPI, Streamlit" />
  <meta property="og:title" content="Sai Lingesh R - Data Engineer &amp; AI Engineer" />
  <meta property="og:description" content="Portfolio &amp; Resume of Sai Lingesh R - Data Engineering, AI/LLM, Machine Learning." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --surface2: #f3f2ef;
      --border: #e5e3de;
      --text: #1a1917;
      --text-muted: #6b6860;
      --text-light: #9c9a95;
      --accent: #1a5276;
      --accent-light: #eaf0f6;
      --accent2: #c0392b;
      --tag-bg: #eef2f7;
      --tag-text: #2c5f8a;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 8px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --topbar-h: 56px;
    }

    [data-theme="dark"] {
      --bg: #12110f;
      --surface: #1c1b18;
      --surface2: #252420;
      --border: #333129;
      --text: #f0ede8;
      --text-muted: #9c9a95;
      --text-light: #6b6860;
      --accent: #5b9bd5;
      --accent-light: #1a2a3a;
      --accent2: #e05c4e;
      --tag-bg: #1e2d3d;
      --tag-text: #7ab3e0;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      transition: background 0.3s, color 0.3s;
      min-width: 320px;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1rem, 4vw, 2rem);
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.75rem;
      backdrop-filter: blur(8px);
    }

    .topbar-left { display: flex; align-items: center; gap: 0.75rem; min-width: 0; flex-shrink: 1; }

    .topbar-logo {
      font-family: var(--font-serif); font-size: 1.1rem;
      color: var(--text); text-decoration: none; white-space: nowrap;
    }

    .open-to-work {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; color: #1a7a4a;
      background: #e8f8ee; border: 1px solid #b6e8cc;
      border-radius: 999px; padding: 3px 10px; white-space: nowrap;
    }

    [data-theme="dark"] .open-to-work { color: #4cce82; background: #0f2a1a; border-color: #1e5c36; }

    .open-to-work::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #1a7a4a; flex-shrink: 0; animation: blink 2s infinite;
    }

    [data-theme="dark"] .open-to-work::before { background: #4cce82; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .topbar-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

    .version-selector {
      display: flex; gap: 2px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px;
    }

    .ver-btn {
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      padding: 4px 9px; border: none; border-radius: 4px; cursor: pointer;
      background: transparent; color: var(--text-muted);
      transition: all 0.15s; font-family: var(--font-sans); white-space: nowrap;
    }

    .ver-btn.active { background: var(--accent); color: #fff; }

    .theme-btn {
      width: 34px; height: 34px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface); color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.15s, color 0.15s;
    }

    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
    .theme-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .download-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 6px 13px;
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
      font-family: var(--font-sans); text-decoration: none;
      border: none; white-space: nowrap;
    }

    .download-btn svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
    .btn-pdf { background: var(--accent2); color: #fff; }
    .btn-pdf:hover { opacity: 0.87; }
    .btn-doc { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-doc:hover { border-color: var(--accent); color: var(--accent); }

    /* ── PAGE WRAPPER ── */
    .page-wrapper {
      max-width: 940px; margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1rem, 4vw, 1.5rem) 4rem;
    }

    /* ── HERO ── */
    .hero {
      display: grid; grid-template-columns: 1fr auto;
      gap: 2rem; align-items: start;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 1.25rem;
    }

    .hero-name {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      line-height: 1.1; color: var(--text); margin-bottom: 0.3rem;
    }

    .hero-title {
      font-size: clamp(0.95rem, 2vw, 1.05rem); font-weight: 500;
      color: var(--accent); margin-bottom: 0.45rem; letter-spacing: 0.01em;
    }

    .hero-tagline {
      font-size: clamp(0.83rem, 1.8vw, 0.92rem); color: var(--text-muted);
      margin-bottom: 1.2rem; max-width: 520px;
      font-style: italic; line-height: 1.55;
    }

    .hero-links { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .hero-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      text-decoration: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px;
      transition: all 0.15s; background: var(--surface2);
    }

    .hero-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .hero-link svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    .hero-stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 0.7rem; min-width: 170px;
    }

    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.85rem 0.7rem; text-align: center;
    }

    .stat-num { font-family: var(--font-serif); font-size: 1.55rem; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-light); margin-top: 4px; }

    /* ── SECTIONS ── */
    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(1.2rem, 3vw, 1.8rem) clamp(1.2rem, 3vw, 2rem);
      margin-bottom: 1.1rem; box-shadow: var(--shadow);
    }

    .section-header {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 1.3rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .section-icon {
      width: 26px; height: 26px; background: var(--accent-light);
      border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .section-icon svg { width: 14px; height: 14px; fill: var(--accent); }

    .section-title { font-family: var(--font-serif); font-size: clamp(1rem, 2.5vw, 1.15rem); color: var(--text); }

    /* ── SUMMARY ── */
    .summary-text { font-size: clamp(0.88rem, 1.8vw, 0.95rem); line-height: 1.78; color: var(--text-muted); text-align: justify; }

    /* ── EXPERIENCE ── */
    .exp-item { margin-bottom: 1.5rem; }
    .exp-item:last-child { margin-bottom: 0; }

    .exp-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.3rem; gap: 0.5rem; flex-wrap: wrap;
    }

    .exp-role { font-size: clamp(0.93rem, 2vw, 1rem); font-weight: 600; color: var(--text); }

    .exp-dates {
      font-size: 11.5px; font-family: var(--font-mono); color: var(--text-light);
      background: var(--surface2); padding: 2px 8px;
      border-radius: 4px; border: 1px solid var(--border); white-space: nowrap;
    }

    .exp-company { font-size: 0.87rem; color: var(--accent); font-weight: 500; margin-bottom: 0.65rem; }

    .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }

    .exp-bullets li {
      font-size: clamp(0.85rem, 1.7vw, 0.91rem); color: var(--text-muted);
      padding-left: 1.15rem; position: relative; line-height: 1.62; text-align: justify;
    }

    .exp-bullets li::before {
      content: ''; position: absolute; left: 0; top: 9px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); opacity: 0.7;
    }

    /* ── SKILLS ── */
    .skills-grid { display: flex; flex-direction: column; gap: 1rem; }

    .skill-category-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-light); margin-bottom: 0.45rem;
    }

    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    .skill-tag {
      font-size: 12px; font-weight: 500;
      background: var(--tag-bg); color: var(--tag-text);
      border-radius: 5px; padding: 4px 10px;
      border: 1px solid transparent; transition: border-color 0.15s; line-height: 1.3;
    }

    .skill-tag:hover { border-color: var(--accent); }
    .skill-tag.highlight { background: var(--accent); color: #fff; }

    /* ── PROJECTS ── */
    .projects-grid { display: flex; flex-direction: column; gap: 1.1rem; }

    .project-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: clamp(1rem, 2.5vw, 1.2rem);
      transition: border-color 0.2s;
    }

    .project-card:hover { border-color: var(--accent); }

    .project-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.35rem; gap: 0.5rem; flex-wrap: wrap;
    }

    .project-name { font-size: clamp(0.9rem, 2vw, 0.97rem); font-weight: 600; color: var(--text); }

    .project-meta { font-size: 11px; font-family: var(--font-mono); color: var(--text-light); }

    .project-client {
      font-size: 11.5px; font-weight: 600; color: var(--accent);
      margin-bottom: 0.4rem; letter-spacing: 0.02em;
    }

    .project-desc { font-size: clamp(0.83rem, 1.7vw, 0.88rem); color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.6; text-align: justify; }

    .project-highlights { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }

    .project-highlights li {
      font-size: clamp(0.82rem, 1.6vw, 0.86rem); color: var(--text-muted);
      padding-left: 1rem; position: relative; line-height: 1.55;
    }

    .project-highlights li::before {
      content: ''; position: absolute; left: 0; top: 7px;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); opacity: 0.6;
    }

    .tech-stack { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .tech-pill {
      font-size: 11px; font-family: var(--font-mono);
      background: var(--surface); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px;
    }

    /* ── EDUCATION ── */
    .edu-grid { display: flex; flex-direction: column; gap: 0.9rem; }

    .edu-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 1rem; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); gap: 0.75rem; flex-wrap: wrap;
    }

    .edu-degree { font-size: clamp(0.9rem, 2vw, 0.95rem); font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .edu-institution { font-size: clamp(0.82rem, 1.7vw, 0.86rem); color: var(--accent); }
    .edu-year { font-size: 12px; font-family: var(--font-mono); color: var(--text-light); white-space: nowrap; }

    /* ── CERTIFICATIONS ── */
    .certs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }

    .cert-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; text-decoration: none;
      display: block; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .cert-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .cert-issuer { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; }
    .cert-name { font-size: clamp(0.82rem, 1.7vw, 0.87rem); font-weight: 600; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .cert-dates { font-size: 11px; font-family: var(--font-mono); color: var(--text-light); }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 2rem clamp(1rem, 4vw, 2rem); font-size: 12.5px; color: var(--text-light); letter-spacing: 0.01em; }

    /* ── FADE-IN ── */
    .fade-in { opacity: 0; transform: translateY(10px); animation: fadeUp 0.38s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .fade-in:nth-child(1) { animation-delay: 0.04s; }
    .fade-in:nth-child(2) { animation-delay: 0.09s; }
    .fade-in:nth-child(3) { animation-delay: 0.14s; }
    .fade-in:nth-child(4) { animation-delay: 0.19s; }
    .fade-in:nth-child(5) { animation-delay: 0.24s; }
    .fade-in:nth-child(6) { animation-delay: 0.29s; }
    .fade-in:nth-child(7) { animation-delay: 0.34s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; gap: 1.5rem; }
      .hero-stats { grid-template-columns: repeat(4, 1fr); min-width: unset; }
      .certs-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }

    @media (max-width: 640px) {
      :root { --topbar-h: auto; }
      .topbar { height: auto; padding: 0.6rem clamp(0.75rem, 3vw, 1rem); flex-wrap: wrap; gap: 0.5rem; }
      .version-selector { order: 3; width: 100%; justify-content: center; }
      .topbar-right { gap: 0.35rem; }
      .download-btn { padding: 5px 10px; font-size: 11px; }
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      body { font-size: 14px; }
      .open-to-work { display: none; }
      .hero-stats { grid-template-columns: repeat(4, 1fr); }
      .stat-label { font-size: 9px; }
      .stat-num { font-size: 1.1rem; }
      .certs-grid { grid-template-columns: 1fr 1fr; }
      .exp-header { flex-direction: column; gap: 0.25rem; }
    }

    @media (max-width: 360px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .certs-grid { grid-template-columns: 1fr; }
      .ver-btn { padding: 4px 7px; font-size: 10px; }
    }

    @media (min-width: 1400px) { .page-wrapper { max-width: 1040px; } }

    @media print {
      .topbar, footer { display: none !important; }
      body { background: white; font-size: 12px; }
      .page-wrapper { max-width: 100%; padding: 0; }
      .section, .hero { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar" role="navigation">
  <div class="topbar-left">
    <a href="#" class="topbar-logo">SL</a>
    <span class="open-to-work" id="otwBadge">Open to Work</span>
  </div>
  <div class="topbar-right">
    <div class="version-selector" role="group" aria-label="Resume version">

</nav>

<main class="page-wrapper" id="resumeMain">
  <div id="sections-container"></div>
</main>

<footer><p id="footerText"></p></footer>

<script>
  let resumeData = null;
  let currentVersion = 'de';

  // SVG ICONS
  const IC = {

    folder:     '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
    grad:       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>',
    award:      '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>',
    user:       '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
  };

  // SKILL CATEGORY LABELS
  const CAT_LABELS = {
    languages:            'Languages',
    frameworks_libraries: 'Frameworks & Libraries',
    data_engineering:     'Data Engineering',
    ai_ml:                'AI / Machine Learning',
    ai_tools_frameworks:  'AI Tools & Frameworks',
    databases:            'Databases',
    cloud_devops:         'Cloud & DevOps',
    tools_ide:            'Tools & IDEs',
    statistical_analytics:'Statistical & Analytics'
  };

  // ── BOOT ──
  (function init() {
    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);
    document.getElementById('footerText').textContent =
      '\u00A9 ' + new Date().getFullYear() + ' Sai Lingesh \u00B7 All rights reserved';
    const urlRole = new URLSearchParams(window.location.search).get('role');
    if (urlRole) currentVersion = urlRole;
    loadData();
  })();

  async function loadData() {
    try {
      const res = await fetch('./data/resume.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      resumeData = await res.json();
      render();
    } catch (e) {
      document.getElementById('sections-container').innerHTML =
        '<p style="padding:2rem;color:#c0392b;font-family:monospace">Error loading resume.json: ' + e.message + '</p>';
    }
  }

  // ── RENDER ──
  function render() {
    if (!resumeData) return;
    document.querySelectorAll('.ver-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.version === currentVersion));
    document.getElementById('otwBadge').style.display =
      resumeData.personal.open_to_work ? '' : 'none';

    document.getElementById('sections-container').innerHTML = [
      renderHero(),
      renderSummary(),
      renderExperience(),
      renderSkills(),
      renderProjects(),
      renderEducation(),
      renderCertifications()
    ].join('');
  }

  function renderHero() {
    const p = resumeData.personal;
    const v = resumeData.versions[currentVersion];
    const s = resumeData.stats;
    return `
    <div class="hero fade-in">
      <div>
        <h1 class="hero-name">${p.name}</h1>
        <div class="hero-title">${v.title}</div>
        <div class="hero-tagline">${v.tagline}</div>
        <div class="hero-links">
          <a class="hero-link" href="mailto:${p.email}">${IC.email} Email Me</a>
          <a class="hero-link" href="${p.linkedin}" target="_blank" rel="noopener">${IC.linkedin} LinkedIn</a>
          <a class="hero-link" href="${p.portfolio}" target="_blank" rel="noopener">${IC.cert} Certificates</a>
          ${p.open_to_work ? `<span class="hero-link" style="cursor:default">${IC.location} ${p.availability}</span>` : ''}
        </div>
      </div>
      <div class="hero-stats">
        <div class="stat-card"><div class="stat-num">${s.years_experience}+</div><div class="stat-label">Years</div></div>
        <div class="stat-card"><div class="stat-num">${s.projects_completed}+</div><div class="stat-label">Projects</div></div>
        <div class="stat-card"><div class="stat-num">${s.certifications_count}+</div><div class="stat-label">Certificates</div></div>
        <div class="stat-card"><div class="stat-num">${s.technologies_count}+</div><div class="stat-label">Skills</div></div>
      </div>
    </div>`;
  }

  function renderSummary() {
    const v = resumeData.versions[currentVersion];
    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.user}</div><h2 class="section-title">Professional Summary</h2></div>
      <p class="summary-text">${v.summary}</p>
    </div>`;
  }

  function renderExperience() {
    const bulletsKey = 'bullets_' + currentVersion;
    const items = resumeData.experience.map(job => {
      const bullets = job[bulletsKey] || job.bullets_de || [];
      return `
      <div class="exp-item">
        <div class="exp-header">
          <span class="exp-role">${job.role}</span>
          <span class="exp-dates">${job.start_date} &ndash; ${job.end_date}</span>
        </div>
        <div class="exp-company">${job.company} &middot; ${job.location} &middot; ${job.type}</div>
        <ul class="exp-bullets">${bullets.map(b => `<li>${b}</li>`).join('')}</ul>
      </div>`;
    }).join('');
    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.briefcase}</div><h2 class="section-title">Work Experience</h2></div>
      ${items}
    </div>`;
  }

  function renderSkills() {
    const v = resumeData.versions[currentVersion];
    const sk = resumeData.skills;
    const topSkills = v.top_skills;
    const order = v.skill_order;

    const rows = order.map(key => {
      if (!sk[key] || sk[key].length === 0) return '';
      return `
      <div>
        <div class="skill-category-label">${CAT_LABELS[key]}</div>
        <div class="skill-tags">
          ${sk[key].map(s => `<span class="skill-tag${topSkills.includes(s) ? ' highlight' : ''}">${s}</span>`).join('')}
        </div>
      </div>`;
    }).join('');

    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.bolt}</div><h2 class="section-title">Technical Skills</h2></div>
      <div class="skills-grid">${rows}</div>
    </div>`;
  }

  function renderProjects() {
    const projects = resumeData.projects.filter(p => p.tags.includes(currentVersion));
    if (!projects.length) return '';
    const cards = projects.map(p => `
      <div class="project-card">
        <div class="project-header">
          <span class="project-name">${p.name}</span>
          <span class="project-meta">${p.duration} &middot; Team: ${p.team_size}</span>
        </div>
        <div class="project-client">Client: ${p.client} &nbsp;&middot;&nbsp; Role: ${p.role}</div>
        <div class="project-desc">${p.description}</div>
        <ul class="project-highlights">${p.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
        <div class="tech-stack">${p.tech_stack.map(t => `<span class="tech-pill">${t}</span>`).join('')}</div>
      </div>`).join('');
    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.folder}</div><h2 class="section-title">Projects</h2></div>
      <div class="projects-grid">${cards}</div>
    </div>`;
  }

  function renderEducation() {
    const items = resumeData.education.map(e => `
      <div class="edu-item">
        <div><div class="edu-degree">${e.degree}</div><div class="edu-institution">${e.institution}</div></div>
        <div class="edu-year">${e.year}</div>
      </div>`).join('');
    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.grad}</div><h2 class="section-title">Education</h2></div>
      <div class="edu-grid">${items}</div>
    </div>`;
  }

  function renderCertifications() {
    const items = resumeData.certifications.map(c => `
      <a class="cert-card" href="${c.credential_url}" target="_blank" rel="noopener">
        <div class="cert-issuer">${c.issuer}</div>
        <div class="cert-name">${c.name}</div>
        <div class="cert-dates">Issued: ${c.issued}${c.expires ? ' &middot; Exp: ' + c.expires : ''}</div>
      </a>`).join('');
    return `
    <div class="section fade-in">
      <div class="section-header"><div class="section-icon">${IC.award}</div><h2 class="section-title">Certifications</h2></div>
      <div class="certs-grid">${items}</div>
    </div>`;
  }

  // ── VERSION SWITCH ──
  function switchVersion(ver) {
    currentVersion = ver;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── THEME ──
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');
    if (moon) moon.style.display = t === 'dark' ? 'none' : '';
    if (sun)  sun.style.display  = t === 'dark' ? '' : 'none';
  }

  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
  }

  // ── BUILD CLEAN RESUME DOCUMENT ──
  function buildResumeDoc() {
    const p  = resumeData.personal;
    const v  = resumeData.versions[currentVersion];
    const sk = resumeData.skills;
    const bulletsKey = 'bullets_' + currentVersion;
    const projects = resumeData.projects.filter(pr => pr.tags.includes(currentVersion));
    const skillOrder = v.skill_order;

    const skillsHTML = skillOrder.map(key => {
      if (!sk[key] || !sk[key].length) return '';
      return `<p style="margin:0 0 5pt;font-size:10.5pt;line-height:1.55;text-align:left;">
        <strong style="color:#1a3f5c;">${CAT_LABELS[key]}:</strong> ${sk[key].join(', ')}</p>`;
    }).join('');

    const expHTML = resumeData.experience.map(job => {
      const bullets = job[bulletsKey] || job.bullets_de || [];
      return `
      <div style="margin-bottom:14pt;">
        <table style="width:100%;border-collapse:collapse;margin-bottom:2pt;"><tr>
          <td style="font-size:11.5pt;font-weight:bold;color:#0d0d0d;">${job.role}</td>
          <td style="text-align:right;font-size:10pt;color:#555;font-family:'Courier New',monospace;white-space:nowrap;">${job.start_date} &ndash; ${job.end_date}</td>
        </tr></table>
        <p style="margin:1pt 0 6pt;font-size:10.5pt;color:#1a3f5c;font-weight:600;">${job.company} &bull; ${job.location}</p>
        <ul style="margin:0;padding-left:17pt;">
          ${bullets.map(b => `<li style="font-size:10.5pt;color:#111;margin-bottom:4pt;line-height:1.5;text-align:justify;">${b}</li>`).join('')}
        </ul>
      </div>`;
    }).join('');

    const projHTML = projects.map(pr => `
      <div style="margin-bottom:14pt;">
        <table style="width:100%;border-collapse:collapse;margin-bottom:2pt;"><tr>
          <td style="font-size:11pt;font-weight:bold;color:#0d0d0d;">${pr.name}</td>
          <td style="text-align:right;font-size:10pt;color:#555;white-space:nowrap;">${pr.duration}</td>
        </tr></table>
        <p style="margin:1pt 0 4pt;font-size:10pt;color:#1a3f5c;">Client: ${pr.client} &nbsp;&bull;&nbsp; Role: ${pr.role} &nbsp;&bull;&nbsp; Team: ${pr.team_size}</p>
        <p style="font-size:10.5pt;color:#222;margin:0 0 5pt;line-height:1.55;text-align:justify;">${pr.description}</p>
        <ul style="margin:0 0 5pt;padding-left:17pt;">
          ${pr.highlights.map(h => `<li style="font-size:10.5pt;color:#111;margin-bottom:3pt;line-height:1.45;text-align:justify;">${h}</li>`).join('')}
        </ul>
        <p style="font-size:10pt;color:#444;margin:0;"><strong>Technologies:</strong> ${pr.tech_stack.join(', ')}</p>
      </div>`).join('');

    const eduHTML = resumeData.education.map(e => `
      <div style="margin-bottom:10pt;">
        <table style="width:100%;border-collapse:collapse;margin-bottom:2pt;"><tr>
          <td style="font-size:11pt;font-weight:bold;color:#0d0d0d;">${e.degree}</td>
          <td style="text-align:right;font-size:10pt;color:#555;">${e.year}</td>
        </tr></table>
        <p style="margin:1pt 0 0;font-size:10.5pt;color:#1a3f5c;">${e.institution}</p>
      </div>`).join('');

    const certHTML = resumeData.certifications.map(c =>
      `<p style="margin:0 0 5pt;font-size:10.5pt;color:#111;line-height:1.5;">
        <strong>${c.name}</strong> &mdash; ${c.issuer}, ${c.issued}${c.expires ? ' (Expires: ' + c.expires + ')' : ''}
      </p>`).join('');

    return { p, v, skillsHTML, expHTML, projHTML, eduHTML, certHTML };
  }

  // ── HEADING STYLE (shared) ──
  const HEADING_STYLE = `font-size:10.5pt;font-weight:700;color:#1a3f5c;text-transform:uppercase;
    letter-spacing:0.08em;border-bottom:1.5px solid #c8d8e8;padding-bottom:3pt;margin:14pt 0 8pt;`;

  // ── DOWNLOAD PDF ──
  // Opens a clean print window with precise A4 layout
  function downloadPDF() {
    if (!resumeData) return;
    const { p, v, skillsHTML, expHTML, projHTML, eduHTML, certHTML } = buildResumeDoc();

    const html = `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/>
<title>${p.name} Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  @page { size: A4; margin: 18mm 20mm 16mm 20mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Calibri, 'Segoe UI', Arial, sans-serif; font-size: 10.5pt; color: #0d0d0d; background: #fff; line-height: 1.45; }
  .name { font-size: 22pt; font-weight: 700; color: #0d0d0d; margin-bottom: 2pt; letter-spacing: -0.01em; }
  .title { font-size: 12pt; font-weight: 600; color: #1a3f5c; margin-bottom: 5pt; }
  .contact { font-size: 10pt; color: #444; padding-bottom: 8pt; border-bottom: 2pt solid #1a3f5c; margin-bottom: 2pt; }
  .contact a { color: #1a3f5c; text-decoration: none; }
  h2 { ${HEADING_STYLE} display: block; }
  ul { padding-left: 17pt; }
  li { margin-bottom: 3pt; text-align: justify; }
  p { margin: 0; }
  @media print {
    body { margin: 0; }
    h2 { page-break-after: avoid; }
    div { orphans: 3; widows: 3; }
  }
</style></head><body>
<div class="name">${p.name}</div>
<div class="title">${v.title}</div>
<div class="contact">${p.email} &nbsp;|&nbsp; ${p.phone} &nbsp;|&nbsp; ${p.location} &nbsp;|&nbsp; <a href="${p.linkedin}">${p.linkedin}</a> &nbsp;|&nbsp; <a href="${p.portfolio}">${p.portfolio}</a></div>
<h2>Professional Summary</h2>
<p style="font-size:10.5pt;color:#111;line-height:1.6;text-align:justify;margin-bottom:4pt;">${v.summary}</p>
<h2>Work Experience</h2>${expHTML}
<h2>Technical Skills</h2>${skillsHTML}
<h2>Projects</h2>${projHTML}
<h2>Education</h2>${eduHTML}
<h2>Certifications</h2>${certHTML}
</body></html>`;

    const win = window.open('', '_blank', 'width=960,height=720,scrollbars=yes');
    if (!win) { alert('Please allow pop-ups for this site to download the PDF.'); return; }
    win.document.write(html);
    win.document.close();
    win.onload = () => setTimeout(() => { win.focus(); win.print(); }, 800);
  }

  // ── DOWNLOAD DOCX ──
  // Generates proper Word XML with full text justification
  function downloadDOCX() {
    if (!resumeData) return;
    const { p, v, skillsHTML, expHTML, projHTML, eduHTML, certHTML } = buildResumeDoc();

    // Word XML justification styles injected at top level
    const wordDoc = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8"/>
<meta name=ProgId content=Word.Document/>
<meta name=Generator content="Microsoft Word 15"/>
<!--[if gte mso 9]>
<xml><w:WordDocument>
  <w:View>Print</w:View><w:Zoom>100</w:Zoom>
  <w:DoNotOptimizeForBrowser/>
</w:WordDocument></xml><![endif]-->
<style>
  @page Section1 {
    size: 21.0cm 29.7cm;
    margin: 2.0cm 2.2cm 1.8cm 2.2cm;
    mso-header-margin: 0; mso-footer-margin: 0; mso-paper-source: 0;
  }
  div.Section1 { page: Section1; }
  body { font-family: Calibri, Arial, sans-serif; font-size: 10.5pt; color: #0d0d0d; line-height: 1.45; }
  p, li { font-family: Calibri, Arial, sans-serif; margin: 0; padding: 0; }
  p { mso-line-height-rule: exactly; }
  li { text-align: justify; mso-text-justify: inter-word; }
  .name { font-size: 22pt; font-weight: bold; color: #0d0d0d; margin-bottom: 2pt; }
  .title { font-size: 12pt; font-weight: bold; color: #1a3f5c; margin-bottom: 5pt; }
  .contact { font-size: 10pt; color: #444; border-bottom: 2pt solid #1a3f5c; padding-bottom: 6pt; margin-bottom: 2pt; }
  h2 { font-size: 10.5pt; font-weight: bold; color: #1a3f5c; text-transform: uppercase;
       letter-spacing: 0.08em; border-bottom: 1pt solid #c8d8e8; padding-bottom: 2pt;
       margin: 14pt 0 7pt; mso-border-bottom-alt: solid #c8d8e8 .5pt; }
  .jsfy { text-align: justify; mso-text-justify: inter-word; }
  ul { margin: 0; padding-left: 18pt; }
</style>
</head>
<body>
<div class="Section1">
<p class="name">${p.name}</p>
<p class="title">${v.title}</p>
<p class="contact">${p.email} &nbsp;|&nbsp; ${p.phone} &nbsp;|&nbsp; ${p.location} &nbsp;|&nbsp; ${p.linkedin} &nbsp;|&nbsp; ${p.portfolio}</p>

<h2>Professional Summary</h2>
<p class="jsfy" style="font-size:10.5pt;color:#111;line-height:1.6;margin-bottom:4pt;">${v.summary}</p>

<h2>Work Experience</h2>
${expHTML}

<h2>Technical Skills</h2>
${skillsHTML}

<h2>Projects</h2>
${projHTML}

<h2>Education</h2>
${eduHTML}

<h2>Certifications</h2>
${certHTML}
</div>
</body></html>`;

    const blob = new Blob(['\ufeff', wordDoc], { type: 'application/msword;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${p.name.replace(/ /g,'_')}_${v.title.replace(/[\s\/|]+/g,'_')}_Resume.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }
</script>
</body>
</html>
