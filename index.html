<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>Sai Lingesh R – Data Engineer &amp; AI/ML Engineer</title>
  <meta name="description" content="Sai Lingesh R – Data Engineer, AI/LLM Engineer, and ML Practitioner. Specializing in Databricks, PySpark, LLMs, and intelligent data systems." />
  <meta name="keywords" content="Data Engineer, AI Engineer, ML Engineer, Databricks, PySpark, Python, LLM, Machine Learning, Generative AI" />
  <meta property="og:title" content="Sai Lingesh R – Data Engineer &amp; AI Engineer" />
  <meta property="og:description" content="Portfolio &amp; Resume of Sai Lingesh R – Data Engineering, AI/LLM, Machine Learning." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --surface2: #f3f2ef;
      --border: #e5e3de;
      --text: #1a1917;
      --text-muted: #6b6860;
      --text-light: #9c9a95;
      --accent: #1a5276;
      --accent-light: #eaf0f6;
      --accent2: #c0392b;
      --tag-bg: #eef2f7;
      --tag-text: #2c5f8a;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 8px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --topbar-h: 56px;
    }

    [data-theme="dark"] {
      --bg: #12110f;
      --surface: #1c1b18;
      --surface2: #252420;
      --border: #333129;
      --text: #f0ede8;
      --text-muted: #9c9a95;
      --text-light: #6b6860;
      --accent: #5b9bd5;
      --accent-light: #1a2a3a;
      --accent2: #e05c4e;
      --tag-bg: #1e2d3d;
      --tag-text: #7ab3e0;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      transition: background 0.3s, color 0.3s;
      min-width: 320px;
    }

    /* ─────────────────────────────────────
       TOPBAR
    ───────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1rem, 4vw, 2rem);
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      backdrop-filter: blur(8px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
      flex-shrink: 1;
    }

    .topbar-logo {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .open-to-work {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1a7a4a;
      background: #e8f8ee;
      border: 1px solid #b6e8cc;
      border-radius: 999px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    [data-theme="dark"] .open-to-work {
      color: #4cce82;
      background: #0f2a1a;
      border-color: #1e5c36;
    }

    .open-to-work::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a7a4a;
      flex-shrink: 0;
      animation: blink 2s infinite;
    }

    [data-theme="dark"] .open-to-work::before { background: #4cce82; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    /* Version selector */
    .version-selector {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }

    .ver-btn {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 4px 9px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: var(--font-sans);
      white-space: nowrap;
    }

    .ver-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Theme toggle */
    .theme-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    .theme-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Download buttons */
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-sans);
      text-decoration: none;
      border: none;
      white-space: nowrap;
    }

    .download-btn svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

    .btn-pdf { background: var(--accent2); color: #fff; }
    .btn-pdf:hover { opacity: 0.87; }

    .btn-doc { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-doc:hover { border-color: var(--accent); color: var(--accent); }

    /* ─────────────────────────────────────
       PAGE WRAPPER
    ───────────────────────────────────── */
    .page-wrapper {
      max-width: 940px;
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1rem, 4vw, 1.5rem) 4rem;
    }

    /* ─────────────────────────────────────
       HERO
    ───────────────────────────────────── */
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      align-items: start;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
    }

    .hero-name {
      font-family: var(--font-serif);
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .hero-title {
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 0.45rem;
      letter-spacing: 0.01em;
    }

    .hero-tagline {
      font-size: clamp(0.83rem, 1.8vw, 0.92rem);
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      max-width: 520px;
      font-style: italic;
      line-height: 1.55;
    }

    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      transition: all 0.15s;
      background: var(--surface2);
    }

    .hero-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .hero-link svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    /* Stats */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.7rem;
      min-width: 170px;
    }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 0.7rem;
      text-align: center;
    }

    .stat-num {
      font-family: var(--font-serif);
      font-size: 1.55rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* ─────────────────────────────────────
       SECTIONS
    ───────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(1.2rem, 3vw, 1.8rem) clamp(1.2rem, 3vw, 2rem);
      margin-bottom: 1.1rem;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.3rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .section-icon {
      width: 26px; height: 26px;
      background: var(--accent-light);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .section-icon svg { width: 14px; height: 14px; fill: var(--accent); }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: var(--text);
    }

    /* ─────────────────────────────────────
       SUMMARY
    ───────────────────────────────────── */
    .summary-text {
      font-size: clamp(0.88rem, 1.8vw, 0.95rem);
      line-height: 1.78;
      color: var(--text-muted);
      text-align: justify;
    }

    /* ─────────────────────────────────────
       EXPERIENCE
    ───────────────────────────────────── */
    .exp-item { margin-bottom: 1.5rem; }
    .exp-item:last-child { margin-bottom: 0; }

    .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.3rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .exp-role {
      font-size: clamp(0.93rem, 2vw, 1rem);
      font-weight: 600;
      color: var(--text);
    }

    .exp-dates {
      font-size: 11.5px;
      font-family: var(--font-mono);
      color: var(--text-light);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .exp-company {
      font-size: 0.87rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.65rem;
    }

    .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }

    .exp-bullets li {
      font-size: clamp(0.85rem, 1.7vw, 0.91rem);
      color: var(--text-muted);
      padding-left: 1.15rem;
      position: relative;
      line-height: 1.62;
    }

    .exp-bullets li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
    }

    /* ─────────────────────────────────────
       SKILLS
    ───────────────────────────────────── */
    .skills-grid { display: flex; flex-direction: column; gap: 1rem; }

    .skill-category-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.45rem;
    }

    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    .skill-tag {
      font-size: 12px;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 5px;
      padding: 4px 10px;
      border: 1px solid transparent;
      transition: border-color 0.15s;
      line-height: 1.3;
    }

    .skill-tag:hover { border-color: var(--accent); }
    .skill-tag.highlight { background: var(--accent); color: #fff; }

    /* ─────────────────────────────────────
       PROJECTS
    ───────────────────────────────────── */
    .projects-grid { display: flex; flex-direction: column; gap: 1.1rem; }

    .project-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1rem, 2.5vw, 1.2rem);
      transition: border-color 0.2s;
    }

    .project-card:hover { border-color: var(--accent); }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.35rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .project-name { font-size: clamp(0.9rem, 2vw, 0.97rem); font-weight: 600; color: var(--text); }
    .project-meta { font-size: 11px; font-family: var(--font-mono); color: var(--text-light); }

    .project-desc {
      font-size: clamp(0.83rem, 1.7vw, 0.88rem);
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    .project-highlights { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }

    .project-highlights li {
      font-size: clamp(0.82rem, 1.6vw, 0.86rem);
      color: var(--text-muted);
      padding-left: 1rem;
      position: relative;
      line-height: 1.55;
    }

    .project-highlights li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 7px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
    }

    .tech-stack { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .tech-pill {
      font-size: 11px;
      font-family: var(--font-mono);
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
    }

    /* ─────────────────────────────────────
       EDUCATION
    ───────────────────────────────────── */
    .edu-grid { display: flex; flex-direction: column; gap: 0.9rem; }

    .edu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .edu-degree { font-size: clamp(0.9rem, 2vw, 0.95rem); font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .edu-institution { font-size: clamp(0.82rem, 1.7vw, 0.86rem); color: var(--accent); }
    .edu-year { font-size: 12px; font-family: var(--font-mono); color: var(--text-light); white-space: nowrap; }

    /* ─────────────────────────────────────
       CERTIFICATIONS
    ───────────────────────────────────── */
    .certs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }

    .cert-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .cert-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .cert-issuer {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .cert-name { font-size: clamp(0.82rem, 1.7vw, 0.87rem); font-weight: 600; color: var(--text); margin-bottom: 0.3rem; line-height: 1.4; }
    .cert-dates { font-size: 11px; font-family: var(--font-mono); color: var(--text-light); }

    /* ─────────────────────────────────────
       FOOTER
    ───────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem clamp(1rem, 4vw, 2rem);
      font-size: 12.5px;
      color: var(--text-light);
      letter-spacing: 0.01em;
    }

    /* ─────────────────────────────────────
       FADE-IN ANIMATION
    ───────────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.38s ease forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .fade-in:nth-child(1) { animation-delay: 0.04s; }
    .fade-in:nth-child(2) { animation-delay: 0.09s; }
    .fade-in:nth-child(3) { animation-delay: 0.14s; }
    .fade-in:nth-child(4) { animation-delay: 0.19s; }
    .fade-in:nth-child(5) { animation-delay: 0.24s; }
    .fade-in:nth-child(6) { animation-delay: 0.29s; }
    .fade-in:nth-child(7) { animation-delay: 0.34s; }

    /* ─────────────────────────────────────
       RESPONSIVE BREAKPOINTS
    ───────────────────────────────────── */

    /* Tablet landscape / small desktop */
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; gap: 1.5rem; }
      .hero-stats { grid-template-columns: repeat(4, 1fr); min-width: unset; }
      .certs-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }

    /* Tablet portrait */
    @media (max-width: 640px) {
      :root { --topbar-h: auto; }
      .topbar { height: auto; padding: 0.6rem clamp(0.75rem, 3vw, 1rem); flex-wrap: wrap; gap: 0.5rem; }
      .version-selector { order: 3; width: 100%; justify-content: center; }
      .topbar-right { gap: 0.35rem; }
      .download-btn { padding: 5px 10px; font-size: 11px; }
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .stat-card { padding: 0.7rem 0.5rem; }
      .stat-num { font-size: 1.3rem; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body { font-size: 14px; }
      .open-to-work { display: none; }
      .hero-stats { grid-template-columns: repeat(4, 1fr); }
      .stat-label { font-size: 9px; letter-spacing: 0.04em; }
      .stat-num { font-size: 1.1rem; }
      .certs-grid { grid-template-columns: 1fr 1fr; }
      .exp-header { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
    }

    /* Very small screens */
    @media (max-width: 360px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .certs-grid { grid-template-columns: 1fr; }
      .ver-btn { padding: 4px 7px; font-size: 10px; }
    }

    /* Large screens / ultrawide */
    @media (min-width: 1400px) {
      .page-wrapper { max-width: 1040px; }
    }

    /* ─────────────────────────────────────
       PRINT / PDF STYLES
       (used by the dedicated print window)
    ───────────────────────────────────── */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .topbar, footer, .hero-stats { display: none !important; }
      body { background: white; font-size: 12px; }
      .page-wrapper { max-width: 100%; padding: 0; }
      .section, .hero { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; margin-bottom: 0.6rem; }
      .hero { grid-template-columns: 1fr; }
    }

    /* ─────────────────────────────────────
       HIDDEN PRINT TEMPLATE
    ───────────────────────────────────── */
    #printTemplate { display: none; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar" role="navigation" aria-label="Site navigation">
  <div class="topbar-left">
    <a href="#" class="topbar-logo" aria-label="Home">SL</a>
    <span class="open-to-work" id="otwBadge" aria-label="Open to work status">Open to Work</span>
  </div>
  <div class="topbar-right">
    <div class="version-selector" role="group" aria-label="Resume version">
      <button class="ver-btn active" data-version="de" onclick="switchVersion('de')">Data Eng</button>
      <button class="ver-btn" data-version="swe" onclick="switchVersion('swe')">SWE</button>
      <button class="ver-btn" data-version="ds" onclick="switchVersion('ds')">Data Sci</button>
      <button class="ver-btn" data-version="ai" onclick="switchVersion('ai')">AI / LLM</button>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle dark mode">
      <!-- Moon icon (light mode) -->
      <svg id="iconMoon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      <!-- Sun icon (dark mode, hidden by default) -->
      <svg id="iconSun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="download-btn btn-pdf" onclick="downloadPDF()" aria-label="Download PDF resume">
      <svg viewBox="0 0 24 24"><path d="M12 16l-4-4h3V4h2v8h3l-4 4zM4 18h16v2H4v-2z"/></svg>
      PDF

    <button class="download-btn btn-doc" onclick="downloadDOCX()" aria-label="Download Word resume">

<script>
  // ─────────────────────────────────────
  // STATE

  // ─────────────────────────────────────
  // BOOT
  // ─────────────────────────────────────
  (function init() {
    // Theme
    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);

    // Dynamic footer year
    document.getElementById('footerText').textContent =
      '\u00A9 ' + new Date().getFullYear() + ' Sai Lingesh \u00B7 All rights reserved';

    // URL role param
    const urlRole = new URLSearchParams(window.location.search).get('role');
    if (urlRole) currentVersion = urlRole;

    loadData();
  })();

  // ─────────────────────────────────────
  // DATA
  // ─────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch('./data/resume.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      resumeData = await res.json();
      render();
    } catch (e) {
      document.getElementById('sections-container').innerHTML =
        '<p style="padding:2rem;color:#c0392b;font-family:monospace">Error loading resume.json – ' + e.message + '</p>';
    }
  }

  // ─────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────
  function render() {
    if (!resumeData) return;
    const v = resumeData.versions[currentVersion];
    const p = resumeData.personal;
    const s = resumeData.stats;

    // Version buttons
    document.querySelectorAll('.ver-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.version === currentVersion));

    document.getElementById('sections-container').innerHTML = [
      renderHero(p, v, s),

      renderProjects(),
      renderEducation(),

  }

  // SVG ICONS (inline, no emojis)
  const ICONS = {

    certificate: '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 1l3.22 6.52L22 8.69l-5 4.87 1.18 6.88L12 17.27l-6.18 3.17L7 13.56 2 8.69l6.78-.97L12 1z"/></svg>',
    location: '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',

    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─────────────────────────────────────
  // THEME
  // ─────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const moon = document.getElementById('iconMoon');
    const sun = document.getElementById('iconSun');
    if (moon && sun) {
      moon.style.display = theme === 'dark' ? 'none' : '';
      sun.style.display = theme === 'dark' ? '' : 'none';
    }
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme', next);
  }

  // ─────────────────────────────────────
  // DOWNLOAD PDF
  // Opens a clean print window — user
  // saves as PDF via browser print dialog.
  // ─────────────────────────────────────
  function downloadPDF() {
    if (!resumeData) return;
    const html = buildResumeHTML();
    const win = window.open('', '_blank', 'width=900,height=700');
    win.document.write(html);
    win.document.close();
    win.onload = () => {
      setTimeout(() => {
        win.focus();
        win.print();
      }, 600);
    };
  }

  // ─────────────────────────────────────
  // DOWNLOAD DOCX
  // Generates a proper Word XML document.
  // ─────────────────────────────────────
  function downloadDOCX() {
    if (!resumeData) return;
    const p = resumeData.personal;
    const v = resumeData.versions[currentVersion];
    const exp = resumeData.experience;
    const sk = resumeData.skills;
    const projects = resumeData.projects.filter(pr => pr.tags.includes(currentVersion));
    const edu = resumeData.education;
    const certs = resumeData.certifications;

    // Build Word-compatible HTML (mhtml trick for reliable .doc formatting)
    const wordHTML = buildWordHTML(p, v, exp, sk, projects, edu, certs);

    const blob = new Blob(['\ufeff', wordHTML], {
      type: 'application/msword;charset=utf-8'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const filename = p.name.replace(/ /g,'_') + '_' + v.title.replace(/[\/ ]+/g,'_') + '_Resume.doc';
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

    const projRows = projects.map(pr => `

      <p style="font-size:10.5pt;color:#333;margin:0 0 4pt 0;line-height:1.5;">${pr.description}</p>
      <ul style="margin:0 0 4pt 0;padding-left:18pt;">
        ${pr.highlights.map(h => `<li style="font-size:10.5pt;color:#222;margin-bottom:3pt;line-height:1.45;">${h}</li>`).join('')}
      </ul>
      <p style="font-size:10pt;color:#555;margin:0 0 14pt 0;"><b>Technologies:</b> ${pr.tech_stack.join(', ')}</p>`).join('');

    const eduRows = edu.map(e => `
      <table style="width:100%;border-collapse:collapse;margin-bottom:2pt;">
        <tr>
          <td style="font-size:11pt;font-weight:bold;color:#0d0d0d;">${e.degree}</td>
          <td style="text-align:right;font-size:10pt;color:#666;">${e.year}</td>
        </tr>
      </table>
      <p style="margin:2pt 0 10pt 0;font-size:10.5pt;color:#1a3f5c;">${e.institution}</p>`).join('');

    const certRows = certs.map(c =>
      `<p style="margin:0 0 4pt 0;font-size:10.5pt;color:#222;"><b>${c.name}</b> &mdash; ${c.issuer}, ${c.issued}${c.expires ? ' (Expires: ' + c.expires + ')' : ''}</p>`
    ).join('');

    return `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="UTF-8"/>
<meta name=ProgId content=Word.Document/>
<meta name=Generator content="Microsoft Word 15"/>

<xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml>

  .section-heading { font-size:11pt; font-weight:bold; color:#1a3f5c; text-transform:uppercase; letter-spacing:0.08em; border-bottom:1px solid #c8d8e8; padding-bottom:3pt; margin:14pt 0 8pt 0; }
</style>
</head>
<body>

<p style="font-size:12pt;font-weight:600;color:#1a3f5c;margin:0 0 5pt 0;">${v.title}</p>
<p style="font-size:10pt;color:#444;margin:0 0 10pt 0;border-bottom:2px solid #1a3f5c;padding-bottom:7pt;">
  ${p.email} &nbsp;|&nbsp; ${p.phone} &nbsp;|&nbsp; ${p.location} &nbsp;|&nbsp; ${p.linkedin} &nbsp;|&nbsp; ${p.portfolio}
</p>

<p class="section-heading">Professional Summary</p>
<p style="font-size:10.5pt;color:#222;line-height:1.6;margin-bottom:10pt;">${v.summary}</p>

<p class="section-heading">Work Experience</p>
${expRows}

${skillRows}
